<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paiement Stripe — HARX</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
      }
      .box {
        text-align: center;
        padding: 2rem;
        max-width: 420px;
      }
      h1 {
        font-size: 1.125rem;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0;
        color: #64748b;
        font-size: 0.9rem;
      }
      .err {
        color: #dc2626;
        margin-top: 1rem;
        font-size: 0.85rem;
      }
      .spin {
        width: 2rem;
        height: 2rem;
        border: 3px solid #e2e8f0;
        border-top-color: #ec4899;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 1rem auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="spin" id="loader"></div>
      <h1 id="title">Finalisation du paiement…</h1>
      <p id="msg">Redirection vers HARX en cours.</p>
      <p class="err" id="err" hidden></p>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var paymentId = params.get('paymentId');
        var sessionId = params.get('session_id') || params.get('sessionId');
        var returnTo = params.get('returnTo') || '/';
        var apiBase = (params.get('apiBase') || '').replace(/\/$/, '');
        var flow = (params.get('flow') || 'subscription').toLowerCase();
        var isPayment = flow === 'payment' || flow === 'wallet' || flow === 'minutes' || flow === 'phone_line';
        var confirmPathParam = (params.get('confirmPath') || '').trim();

        var titleEl = document.getElementById('title');
        var msgEl = document.getElementById('msg');
        var errEl = document.getElementById('err');
        var loaderEl = document.getElementById('loader');

        titleEl.textContent = isPayment
          ? 'Finalisation du paiement…'
          : "Finalisation de l'abonnement…";

        function appendSuccessFlag(url) {
          var flagKey = isPayment ? 'payment' : 'subscription';
          var flag = flagKey + '=success';
          if (url.indexOf('#') !== -1) {
            var parts = url.split('#');
            var hash = parts[1];
            if (hash.indexOf('?') !== -1) {
              return parts[0] + '#' + hash + '&' + flag;
            }
            return parts[0] + '#' + hash + '?' + flag;
          }
          try {
            var u = new URL(url, location.origin);
            u.searchParams.set(flagKey, 'success');
            return u.toString();
          } catch (e) {
            return url + (url.indexOf('?') !== -1 ? '&' : '?') + flag;
          }
        }

        function notifyOpener(payload) {
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage(payload, '*');
          }
        }

        function fail(message) {
          loaderEl.hidden = true;
          titleEl.textContent = 'Erreur';
          msgEl.textContent = 'Le paiement Stripe a réussi mais la confirmation a échoué.';
          errEl.textContent = message;
          errEl.hidden = false;
        }

        function succeed() {
          notifyOpener({
            type: 'HARX_STRIPE_RETURN',
            flow: flow,
            paymentId: paymentId,
            sessionId: sessionId,
          });
          if (window.opener && !window.opener.closed) {
            titleEl.textContent = 'Paiement confirmé';
            msgEl.textContent = 'Vous pouvez fermer cette fenêtre.';
            loaderEl.hidden = true;
            setTimeout(function () {
              try { window.close(); } catch (e) { /* ignore */ }
            }, 600);
            return;
          }
          var dest = appendSuccessFlag(returnTo);
          location.replace(dest);
        }

        if (!paymentId || !sessionId) {
          fail('Paramètres de retour Stripe manquants (paymentId ou session_id).');
          return;
        }
        if (!apiBase) {
          fail('URL API manquante. Redéployez le front et le back.');
          return;
        }

        var confirmPath;
        if (confirmPathParam) {
          if (/^[a-z]+:\/\//i.test(confirmPathParam)) {
            fail('confirmPath invalide.');
            return;
          }
          confirmPath =
            confirmPathParam.charAt(0) === '/'
              ? confirmPathParam
              : '/' + confirmPathParam;
        } else {
          confirmPath = isPayment
            ? '/payments/checkout/confirm'
            : '/subscriptions/checkout/confirm';
        }

        fetch(apiBase + confirmPath, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paymentId: paymentId, providerRef: sessionId }),
        })
          .then(function (res) {
            return res.text().then(function (txt) {
              var data = {};
              try {
                data = txt ? JSON.parse(txt) : {};
              } catch (e) {
                data = {};
              }
              if (!res.ok || !data.success) {
                throw new Error(
                  (data && (data.message || data.error)) ||
                    'Confirmation serveur échouée (' + res.status + ')'
                );
              }
              succeed();
            });
          })
          .catch(function (err) {
            fail(err && err.message ? err.message : 'Erreur réseau');
          });
      })();
    </script>
  </body>
</html>
