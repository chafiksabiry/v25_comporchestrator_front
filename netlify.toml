[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# Payment return pages must stay static (not rewritten to the SPA shell).
[[redirects]]
  from = "/stripe-return.html"
  to = "/stripe-return.html"
  status = 200

[[redirects]]
  from = "/stripe-cancel.html"
  to = "/stripe-cancel.html"
  status = 200

[[redirects]]
  from = "/paypal-return.html"
  to = "/paypal-return.html"
  status = 200

[[redirects]]
  from = "/paypal-cancel.html"
  to = "/paypal-cancel.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
